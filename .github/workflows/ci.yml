# CI/CD - Ultra CSM
#
# Keep the core gate conservative and clean-checkout friendly:
#
#   * eval          - offline pytest posture suite, no secrets.
#   * scorecard-csm - Agent 1 CSM-native deterministic scorecard, no secrets.
#   * regression-csm - exact spine + seeded distributional regression, no secrets.
#   * endor         - optional security lane, separate from offline eval.
#   * ui-check      - ui/ lint, build, route, and responsive reachability gate;
#                     separate so a UI failure does not hide Python results.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: eval + CSM scorecard
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Ultra CSM
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (2025-11-13)

      - name: Ensure PostgreSQL 16 binaries on PATH
        run: |
          if [ ! -x /usr/lib/postgresql/16/bin/initdb ]; then
            sudo apt-get update
            sudo apt-get install -y postgresql-16
          fi
          echo "/usr/lib/postgresql/16/bin" >> "$GITHUB_PATH"

      - name: Show Postgres tooling
        run: |
          initdb --version
          pg_ctl --version

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v5 (2025-04-24)
        with:
          python-version: "3.12"

      - name: Install Ultra CSM
        run: |
          make setup
          .venv/bin/python --version
          .venv/bin/python -c "import psycopg, ultra_csm; print('ultra-csm import OK')"

      - name: Lint
        run: make lint

      - name: Posture suite
        run: make eval

      - name: Action Control contract drift gate
        run: make action-control-contract-check action-control-sandbox-check

      - name: Hosted read-only fixture drift gate
        run: make hosted-readonly-demo-check

      - name: Hygiene scan
        run: make hygiene

      - name: Agent 1 scorecard + work-queue drift gate
        run: make scorecard-csm-check

      - name: Agent 1 CSM regression
        run: make regression-csm

      - name: Upload scorecards
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4 (2025-03-19)
        with:
          name: scorecards
          path: |
            eval/scorecard_csm.json
            eval/regression_csm.json
            eval/baseline_csm.json
          if-no-files-found: warn

  ui-check:
    name: ui lint + build + reachability
    needs: eval
    runs-on: ubuntu-24.04
    steps:
      - name: Check out Ultra CSM
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (2025-11-13)

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4 (2025-04-02)
        with:
          node-version: "20"

      - name: ui-check
        run: make ui-check

      - name: Install Playwright Chromium
        run: cd ui && npx playwright install --with-deps chromium

      - name: Desktop, mobile, and WCAG A/AA journey
        run: cd ui && npm run test:e2e

  endor:
    name: endor security scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    env:
      ENDOR_TOKEN: ${{ secrets.ENDOR_TOKEN }}
      ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}
    steps:
      - name: Skip notice when Endor is not configured
        if: ${{ env.ENDOR_TOKEN == '' }}
        run: echo "::notice::ENDOR_TOKEN not set; skipping the Endor security lane."

      - name: Check out Ultra CSM
        if: ${{ env.ENDOR_TOKEN != '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4 (2025-11-13)
        with:
          fetch-depth: 0

      - name: Endor scan
        if: ${{ env.ENDOR_TOKEN != '' }}
        uses: endorlabs/github-action@b7d24ea6c66af3772707f0fc96e05a91c10107b0 # main @ 2026-06-09
        with:
          namespace: ${{ env.ENDOR_NAMESPACE }}
          scan_dependencies: true
          scan_secrets: true
          scan_sast: true
          pr: true
          pr_incremental: true
          pr_baseline: main
          enable_pr_comments: true
          scan_summary_output_type: table
          github_token: ${{ secrets.GITHUB_TOKEN }}
