[extend]
useDefault = true

[[allowlists]]
description = "Deterministic UUID identifiers in generated demo fixtures and archived UI mockups"
paths = [
  '''^ui/public/demo-api/''',
  '''^docs/ux-mockups/''',
]
regexTarget = "secret"
regexes = [
  '''^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$''',
]
